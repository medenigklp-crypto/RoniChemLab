<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Roni 3D Kimya Laboratuvarı Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body {
            background-color: #08090c;
            color: #e0e6ed;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        /* Daha Kibar ve Mobil Uyumlu Göstergeler */
        .dashboard {
            display: flex;
            gap: 10px;
            padding: 16px 16px 6px 16px;
            background: linear-gradient(to bottom, #11141a, #08090c);
        }
        .indicator {
            flex: 1;
            background: rgba(20, 24, 33, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .indicator span {
            display: block;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            font-weight: bold;
            margin-top: 2px;
        }
        #ph-val { color: #00ffcc; text-shadow: 0 0 12px rgba(0,255,204,0.4); }
        #temp-val { color: #ff5533; text-shadow: 0 0 12px rgba(255,85,51,0.4); }

        /* Optimize Edilmiş Küçük Üst Araç Butonları */
        .tools-container {
            display: flex;
            gap: 10px;
            padding: 0 16px 10px 16px;
            background-color: #08090c;
        }
        .btn-tool {
            flex: 1;
            font-size: 12px;
            padding: 10px;
            font-weight: 700;
            border-radius: 10px;
            background: #171b22;
            border: 1px solid rgba(255,255,255,0.06);
            color: #8f9cae;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .btn-tool.active-lid {
            background: linear-gradient(135deg, #00ffcc 0%, #00aa88 100%);
            color: #08090c;
            box-shadow: 0 0 15px rgba(0,255,204,0.4);
            border: none;
        }
        .btn-tool.active-burner {
            background: linear-gradient(135deg, #ff5533 0%, #aa2200 100%);
            color: #ffffff;
            box-shadow: 0 0 15px rgba(255,85,51,0.5);
            border: none;
        }

        /* Simülasyon Alanı */
        .canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #151922 0%, #08090c 90%);
            position: relative;
        }
        canvas {
            background-color: transparent;
            max-width: 100%;
            max-height: 100%;
        }

        #log-panel {
            background-color: #08090c;
            color: #8f9cae;
            font-size: 12px;
            padding: 8px 16px;
            text-align: center;
            font-family: monospace;
            height: 36px;
            overflow: hidden;
        }

        /* Alt Kontrol Paneli */
        .controls {
            background-color: #11141a;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 32px 32px 0 0;
            box-shadow: 0 -15px 35px rgba(0,0,0,0.6);
        }
        
        .select-container {
            display: flex;
            gap: 10px;
        }

        select {
            flex: 1;
            background: #171b22;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 16px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 14px;
            outline: none;
            -webkit-appearance: none;
        }

        .btn-add {
            background: linear-gradient(135deg, #00ffcc 0%, #0088cc 100%);
            color: #08090c;
            font-weight: bold;
            padding: 0 25px;
        }

        button {
            background: linear-gradient(135deg, #232933 0%, #171b22 100%);
            color: #ffffff;
            border: 1px solid rgba(255,255,255,0.03);
            padding: 16px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            -webkit-tap-highlight-color: transparent;
        }
        button:active { transform: scale(0.97); }
        
        .btn-clear {
            background: linear-gradient(135deg, #ff3b30 0%, #660000 100%);
            border: 1px solid rgba(255,59,48,0.2);
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="indicator">HİDROJEN İNDEKSİ <span id="ph-val">7.00</span></div>
        <div class="indicator">TERMAL ENERJİ <span id="temp-val">298.15 K</span></div>
    </div>

    <div class="tools-container">
        <button id="lidToggle" class="btn-tool" onclick="toggleLid()">🔓 LID (KAPAK AÇIK)</button>
        <button id="burnerToggle" class="btn-tool" onclick="toggleBurner()">🔥 BURNER (KAPALI)</button>
    </div>

    <div class="canvas-container">
        <canvas id="chemCanvas" width="600" height="600"></canvas>
    </div>

    <div id="log-panel">Laboratuvar hazır. Reaktif seçip deneye başlayın.</div>

    <div class="controls">
        <div class="select-container">
            <select id="substanceSelect">
                <optgroup label="💧 Sıvılar & Çözeltiler">
                    <option value="H2O">Saf Su (H2O)</option>
                    <option value="Litmus">Turnusol Boyası (Litmus)</option>
                    <option value="Br2">Bromlu Su (Br2)</option>
                    <option value="NH3_H2O">Amonyak Çözeltisi (NH3·H2O)</option>
                    <option value="CH3COOH">Asetik Asit (CH3COOH)</option>
                    <option value="H2O2">Hidrojen Peroksit (H2O2)</option>
                    <option value="HNO3">Nitrik Asit (HNO3)</option>
                    <option value="H2SO4">Sülfürik Asit (H2SO4)</option>
                    <option value="HCl">Hidroklorik Asit (HCl)</option>
                    <option value="HF">Hidroforik Asit (HF)</option>
                </optgroup>
                <optgroup label="🧱 Katılar">
                    <option value="Na">Sodyum Metal (Na)</option>
                    <option value="K">Potasyum Metal (K)</option>
                    <option value="NaCl">Sodyum Klorür (NaCl)</option>
                    <option value="AgNO3">Gümüş Nitrat (AgNO3)</option>
                    <option value="CuSO4">Bakır Sülfat (CuSO4)</option>
                    <option value="KMnO4">Potasyum Permanganat (KMnO4)</option>
                    <option value="FeCl3">Demir(III) Klorür (FeCl3)</option>
                </optgroup>
                <optgroup label="💨 Gaz Reaktifler">
                    <option value="Ar">Argon (Ar)</option>
                    <option value="C2H2">Asetilen (C2H2)</option>
                    <option value="Cl2">Klor Gazı (Cl2)</option>
                    <option value="CO2">Karbondioksit (CO2)</option>
                    <option value="H2">Hidrojen Gazı (H2)</option>
                    <option value="NH3">Amonyak Gazı (NH3)</option>
                    <option value="O2">Oksijen Gazı (O2)</option>
                    <option value="SO2">Kükürtdioksit (SO2)</option>
                </optgroup>
            </select>
            <button class="btn-add" onclick="handleAdd()">EKLE</button>
        </div>
        <button class="btn-clear" onclick="clearBeaker()">🗑️ Beheri Temizle / Sıfırla</button>
    </div>

    <script>
        const canvas = document.getElementById('chemCanvas');
        const ctx = canvas.getContext('2d');

        let beakerContents = [];
        let mixedPh = 7.0;
        let maxTemp = 298.15;
        let activeIndicators = { litmus: false };
        let hasPrecipitate = false; 
        
        let isLidClosed = false;
        let isBurnerOn = false;

        let liquidLevel = 0; 
        let targetLiquidLevel = 0;
        let waveWave = 0;

        let particles = [];
        let bubbles = [];

        const PALETTES = {
            water: { top: "rgba(0, 180, 216, 0.35)", bottom: "rgba(3, 4, 94, 0.6)" },
            litmusAcid: { top: "rgba(242, 53, 53, 0.6)", bottom: "rgba(138, 12, 12, 0.75)" },
            litmusBase: { top: "rgba(38, 72, 232, 0.6)", bottom: "rgba(14, 25, 133, 0.75)" },
            CuSO4: { top: "rgba(0, 150, 255, 0.5)", bottom: "rgba(0, 48, 143, 0.8)" },
            KKMnO4: { top: "rgba(186, 12, 186, 0.55)", bottom: "rgba(61, 2, 61, 0.85)" },
            FeCl3: { top: "rgba(224, 131, 0, 0.5)", bottom: "rgba(102, 51, 0, 0.8)" },
            Br2: { top: "rgba(186, 45, 11, 0.5)", bottom: "rgba(92, 18, 2, 0.75)" },
            gasCloud: { top: "rgba(255, 255, 255, 0.08)", bottom: "rgba(200, 200, 200, 0.12)" },
            defaultMix: { top: "rgba(215, 220, 228, 0.35)", bottom: "rgba(95, 105, 120, 0.6)" }
        };

        class Bubble {
            constructor() {
                this.x = Math.random() * 210 + 195;
                this.y = 475;
                this.radius = Math.random() * 2 + 0.8;
                this.vy = -(Math.random() * 1.3 + 0.5);
                this.wobble = Math.random() * 100;
            }
            update() {
                this.y += this.vy;
                this.x += Math.sin(this.wobble / 12) * 0.4;
                this.wobble++;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(255, 255, 255, 0.18)";
                ctx.fill();
            }
        }

        class Spark {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 13;
                this.vy = (Math.random() - 0.9) * 15;
                this.radius = Math.random() * 3.5 + 1.2;
                this.life = 1.0;
                this.decay = Math.random() * 0.022 + 0.016;
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += 0.3; this.life -= this.decay; }
            draw() {
                ctx.save(); ctx.shadowBlur = 15; ctx.shadowColor = "#ff5533";
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 95, 35, ${this.life})`; ctx.fill(); ctx.restore();
            }
        }

        function toggleLid() {
            isLidClosed = !isLidClosed;
            const btn = document.getElementById('lidToggle');
            if (isLidClosed) {
                btn.className = "btn-tool active-lid";
                btn.innerText = "🔒 LID (KAPAK KAPALI)";
                log("Sistem: Beher kapağı kapatıldı. Gazlar hapsediliyor.");
            } else {
                btn.className = "btn-tool";
                btn.innerText = "🔓 LID (KAPAK AÇIK)";
                log("Sistem: Beher kapağı açıldı. Gazlar atmosfere yayılıyor.");
            }
        }

        function toggleBurner() {
            isBurnerOn = !isBurnerOn;
            const btn = document.getElementById('burnerToggle');
            if (isBurnerOn) {
                btn.className = "btn-tool active-burner";
                btn.innerText = "🔥 BURNER (ISITICI AÇIK)";
                log("Sistem: Isıtıcı bek alevi aktif. Termal enerji artıyor.");
            } else {
                btn.className = "btn-tool";
                btn.innerText = "🔥 BURNER (KAPALI)";
                log("Sistem: Isıtıcı kapatıldı.");
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            waveWave += 0.07;

            if (isBurnerOn) {
                maxTemp = Math.min(maxTemp + 0.5, 650.00);
                document.getElementById('temp-val').innerText = maxTemp.toFixed(2) + " K";
            } else if (maxTemp > 298.15) {
                maxTemp = Math.max(maxTemp - 0.15, 298.15);
                document.getElementById('temp-val').innerText = maxTemp.toFixed(2) + " K";
            }

            if (!isLidClosed && targetLiquidLevel > 0) {
                const hasGases = beakerContents.some(item => ["Cl2","CO2","H2","NH3","SO2"].includes(item));
                if (hasGases && Math.random() < 0.008) {
                    beakerContents = beakerContents.filter(item => !["Cl2","CO2","H2","NH3","SO2"].includes(item));
                    targetLiquidLevel = Math.max(targetLiquidLevel - 0.06, 0);
                    log("Fizik: Kapak açık olduğundan gaz fazı serbest kalarak atmosfere karıştı.");
                }
            }

            if (liquidLevel < targetLiquidLevel) liquidLevel += 0.01;
            if (liquidLevel > targetLiquidLevel) liquidLevel -= 0.01;

            let bX = 180, bY = 120, bW = 240, bH = 360, bR = 20;
            let currentHeight = bH * liquidLevel;
            let surfaceY = (bY + bH) - currentHeight;

            if (liquidLevel > 0.01) {
                ctx.save();
                let colorBase = getLiquidPalette();
                let liquidGrad = ctx.createLinearGradient(bX, surfaceY, bX, bY + bH);
                liquidGrad.addColorStop(0, colorBase.top);
                liquidGrad.addColorStop(1, colorBase.bottom);
                ctx.fillStyle = liquidGrad;

                ctx.beginPath();
                ctx.moveTo(bX + 4, bY + bH - 4);
                ctx.lineTo(bX + 4, surfaceY);
                
                for (let x = bX + 4; x <= bX + bW - 4; x++) {
                    let waveY = surfaceY + Math.sin((x / 18) + waveWave) * 4.5 * liquidLevel;
                    ctx.lineTo(x, waveY);
                }
                
                ctx.lineTo(bX + bW - 4, bY + bH - 4);
                ctx.closePath();
                ctx.fill();
                ctx.restore();

                if (hasPrecipitate) {
                    ctx.save();
                    let precipGrad = ctx.createLinearGradient(bX, bY + bH - 25, bX, bY + bH);
                    precipGrad.addColorStop(0, "rgba(240, 240, 245, 0.15)");
                    precipGrad.addColorStop(1, "rgba(255, 255, 255, 0.85)");
                    ctx.fillStyle = precipGrad;
                    ctx.beginPath();
                    ctx.moveTo(bX + 6, bY + bH - 4);
                    ctx.ellipse(bX + bW/2, bY + bH - 8, bW/2 - 8, 12, 0, 0, Math.PI, true);
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();
                }

                if (Math.random() < 0.15 + (maxTemp - 298) * 0.003) bubbles.push(new Bubble());
            }

            for (let i = bubbles.length - 1; i >= 0; i--) {
                bubbles[i].update();
                let waveAtX = surfaceY + Math.sin((bubbles[i].x / 18) + waveWave) * 4.5 * liquidLevel;
                if (bubbles[i].y < waveAtX + 4 || liquidLevel === 0) bubbles.splice(i, 1);
                else bubbles[i].draw();
            }

            ctx.save();
            ctx.strokeStyle = "rgba(255, 255, 255, 0.16)";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(bX, bY); ctx.lineTo(bX, bY + bH - bR);
            ctx.arcTo(bX, bY + bH, bX + bR, bY + bH, bR);
            ctx.lineTo(bX + bW - bR, bY + bH);
            ctx.arcTo(bX + bW, bY + bH, bX + bW, bY + bH - bR, bR);
            ctx.lineTo(bX + bW, bY);
            ctx.stroke();

            if (isLidClosed) {
                ctx.strokeStyle = "rgba(0, 255, 204, 0.7)";
                ctx.lineWidth = 6;
                ctx.beginPath();
                ctx.moveTo(bX - 5, bY);
                ctx.lineTo(bX + bW + 5, bY);
                ctx.stroke();
            }

            if (isBurnerOn) {
                ctx.save();
                ctx.shadowBlur = 22;
                ctx.shadowColor = "#ff5533";
                ctx.fillStyle = "rgba(255, 85, 51, 0.28)";
                ctx.fillRect(bX + 15, bY + bH + 4, bW - 30, 16);
                ctx.restore();
            }

            let glassGlow = ctx.createLinearGradient(bX + 4, bY, bX + 14, bY);
            glassGlow.addColorStop(0, "rgba(255, 255, 255, 0.22)");
            glassGlow.addColorStop(1, "rgba(255, 255, 255, 0.0)");
            ctx.fillStyle = glassGlow;
            ctx.fillRect(bX + 4, bY + 10, 8, bH - 20);
            ctx.restore();

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].life <= 0) particles.splice(i, 1);
                else particles[i].draw();
            }

            requestAnimationFrame(animate);
        }

        function getLiquidPalette() {
            if (activeIndicators.litmus) {
                return mixedPh < 7.0 ? PALETTES.litmusAcid : PALETTES.litmusBase;
            }
            if (beakerContents.includes("CuSO4")) return PALETTES.CuSO4;
            if (beakerContents.includes("KMnO4")) return PALETTES.KKMnO4;
            if (beakerContents.includes("FeCl3")) return PALETTES.FeCl3;
            if (beakerContents.includes("Br2")) return PALETTES.Br2;
            if (beakerContents.includes("H2O") && beakerContents.length === 1) return PALETTES.water;
            
            const hasLiquids = beakerContents.some(item => !["Ar","C2H2","Cl2","CO2","F2","H2","H2S","He","N2","NH3","NO2","O2","SO2","Na","K","NaCl","AgNO3"].includes(item));
            if (!hasLiquids && beakerContents.length > 0) return PALETTES.gasCloud;

            return PALETTES.defaultMix;
        }

        function handleAdd() {
            const select = document.getElementById('substanceSelect');
            const val = select.value;
            
            if (!beakerContents.includes(val)) beakerContents.push(val);
            
            let levelInc = ["Ar","C2H2","Cl2","CO2","F2","H2","H2S","He","N2","NH3","NO2","O2","SO2"].includes(val) ? 0.04 : 0.16;
            targetLiquidLevel = Math.min(targetLiquidLevel + levelInc, 0.90);

            if (val === "Na" || val === "K") {
                if (beakerContents.includes("H2O")) {
                    let currentSurfaceY = 480 - (360 * targetLiquidLevel);
                    for (let i = 0; i < 65; i++) particles.push(new Spark(300, currentSurfaceY + 20));
                    mixedPh = val === "K" ? 13.50 : 12.80; 
                    maxTemp = 360.00;
                    beakerContents.push(val === "K" ? "KOH" : "NaOH");
                    log(`⚠️ REAKSİYON: Aktif metal (${val}) suyla reaksiyona girdi! Patlama oluştu.`);
                } else {
                    log(`Sistem: ${val} metal parçası behere eklendi.`);
                }
            }
            else if (val === "HCl" || val === "HNO3" || val === "H2SO4") {
                if (beakerContents.includes("NaOH") || beakerContents.includes("KOH")) {
                    mixedPh = 7.00; maxTemp += 25.0;
                    log(`⚡ NÖTRLEŞME: Asit (${val}) ve baz nötrleşti. Reaksiyon ısısı yayıldı.`);
                } else {
                    mixedPh = 1.10;
                    log(`Sistem: Asit çözeltisi (${val}) eklendi.`);
                }
            }
            else if (val === "NaOH" || val === "KOH") {
                if (beakerContents.includes("HCl") || beakerContents.includes("HNO3")) {
                    mixedPh = 7.00; maxTemp += 25.0;
                    log(`⚡ NÖTRLEŞME: Baz (${val}) ortamdaki asiti nötrleştirdi.`);
                } else {
                    mixedPh = 13.70;
                    log(`Sistem: Baz çözeltisi (${val}) eklendi.`);
                }
            }
            else if ((val === "AgNO3" && beakerContents.includes("NaCl")) || (val === "NaCl" && beakerContents.includes("AgNO3"))) {
                hasPrecipitate = true;
                log("Çökelme: Gümüş Nitrat ve Tuz reaksiyona girdi. Gümüş Klorür [AgCl(k)] beyaz çökeleği oluştu.");
            }
            else if (val === "Litmus") { activeIndicators.litmus = true; log("İndikatör: Turnusol boyası damlatıldı."); }
            else if (val === "H2O") { log("Sistem: Saf Su (H2O) eklendi."); }
            else if (val === "CuSO4") { log("Sistem: Bakır Sülfat (CuSO4) eklendi."); }
            else if (val === "KMnO4") { log("Sistem: Potasyum Permanganat eklendi."); }
            else if (val === "FeCl3") { log("Sistem: Demir(III) Klorür eklendi."); }
            else { log(`Sistem: ${val} laboratuvara ilave edildi.`); }

            document.getElementById('ph-val').innerText = mixedPh.toFixed(2);
            document.getElementById('temp-val').innerText = maxTemp.toFixed(2) + " K";
        }

        function clearBeaker() {
            beakerContents = []; mixedPh = 7.0; maxTemp = 298.15;
            activeIndicators = { litmus: false }; // Yazım hatası düzeltildi (: kullanıldı)
            hasPrecipitate = false; particles = []; bubbles = []; targetLiquidLevel = 0;
            log("Sistem: Beher tamamen boşaltıldı ve temizlendi.");
            document.getElementById('ph-val').innerText = "7.00";
            document.getElementById('temp-val').innerText = "298.15 K";
        }

        animate();
    </script>
</body>
</html>
