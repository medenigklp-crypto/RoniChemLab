<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>QUANTUM LAB CORE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body {
            background-color: #05070a;
            color: #e0e6ed;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        /* 🌌 ELİT, SADE VE DENGELİ GİRİŞ EKRANI */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('image_14.png') no-repeat center center;
            background-size: cover;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 45px 24px 60px 24px;
            opacity: 1;
            transition: opacity 0.5s ease;
        }
        
        /* 1. İKON BÜYÜTME VE ÜST ALAN DÜZENİ */
        .brand-wrapper {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: env(safe-area-inset-top, 20px);
            width: 100%;
        }
        .user-logo-container {
            width: 105px; /* İstediğin gibi ikon belirgin şekilde büyütüldü */
            height: 105px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 12px 35px rgba(0,0,0,0.6);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .user-logo-container img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .splash-title {
            font-size: 15pt; font-weight: 600; letter-spacing: 4px; color: #ffffff;
            margin-top: 14px; text-shadow: 0 4px 12px rgba(0,0,0,0.7);
            opacity: 0.95;
        }
        
        /* 3. DÜZ VE İKİ SATIRLI MÜKEMMEL SLOGAN YERLEŞİMİ */
        .slogan-positioner {
            position: absolute;
            top: 46%; /* Ekranın dikey eksenindeki en kusursuz ve nefes alan boşluk */
            left: 50%;
            transform: translate(-50%, -50%); /* Eğiklik kalktı, pürüzsüz ortalandı */
            width: 90%;
            text-align: center;
            pointer-events: none;
        }
        .premium-slogan {
            font-family: 'Great Vibes', cursive;
            font-size: 26pt; /* İki satır için ideal, taşma yapmayan asil boyut */
            font-weight: normal;
            line-height: 1.45; /* Satırların zarafetle açılması için */
            display: inline-block;
            
            /* Belirttiğin Muazzam Renk Geçişi (Sol Mavi -> Orta Geçiş -> Sağ Turuncu) */
            background: linear-gradient(to right, 
                #BCEEFF 0%,   /* Sol Mavi Yazı İçi */
                #F7EAD7 50%,  /* Orta Geçiş */
                #FFD59A 100%  /* Sağ Turuncu Yazı İçi */
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            /* İstediğin Tam Renk Kodlarıyla Çift Taraflı Neon Işıma Filtresi */
            filter: drop-shadow(-10px -4px 8px rgba(0, 162, 255, 0.6))  /* Sol Mavi Neon parlaması */
                    drop-shadow(10px 4px 8px rgba(255, 102, 0, 0.6));   /* Sağ Turuncu Neon parlaması */
            
            animation: gentleGlow 2.5s ease-in-out infinite alternate;
        }

        @keyframes gentleGlow {
            0% {
                filter: drop-shadow(-8px -3px 6px rgba(0, 162, 255, 0.5)) 
                        drop-shadow(8px 3px 6px rgba(255, 102, 0, 0.5));
                transform: scale(0.99);
            }
            100% {
                filter: drop-shadow(-14px -5px 12px rgba(0, 162, 255, 0.75)) 
                        drop-shadow(14px 5px 12px rgba(255, 102, 0, 0.75));
                transform: scale(1.01);
            }
        }

        /* 2. BUTONU SAĞA KAYDIRMA (Balon Jojeden Uzaklaştırma) */
        .start-btn-container {
            width: 100%;
            display: flex;
            justify-content: flex-end; /* Butonu tamamen sağ tarafa yaslar */
            padding-right: 24px; /* Sınıra sıfır yapışmaması için şık bir boşluk */
            margin-bottom: env(safe-area-inset-bottom, 15px);
        }
        .start-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 162, 255, 0.45);
            color: #bceeff;
            padding: 14px 42px; font-size: 12px;
            font-weight: 700; border-radius: 25px; cursor: pointer; letter-spacing: 2px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255,255,255,0.05);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .start-btn:active {
            transform: scale(0.96);
            background: rgba(0, 162, 255, 0.15);
            border-color: #00a2ff;
            box-shadow: 0 0 20px rgba(0, 162, 255, 0.3);
        }

        /* 🧪 ANA LABORATUVAR PANELİ VE SİMÜLASYON ALANI */
        .dashboard {
            display: flex; gap: 10px; padding: 16px 16px 6px 16px;
            background: linear-gradient(to bottom, #0e1117, #05070a);
        }
        .indicator {
            flex: 1; background: rgba(15, 19, 26, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 12px; padding: 10px; text-align: center;
            font-size: 11px; font-weight: 600; color: #8f9cae;
        }
        .indicator span { display: block; font-family: 'Courier New', monospace; font-size: 18px; font-weight: bold; margin-top: 2px; }
        #ph-val { color: #00ffcc; }
        #temp-val { color: #ff5533; }

        .tools-container { display: flex; gap: 10px; padding: 0 16px 10px 16px; }
        .btn-tool {
            flex: 1; font-size: 12px; padding: 10px; font-weight: 700; border-radius: 10px;
            background: #12161f; border: 1px solid rgba(255,255,255,0.05); color: #8f9cae; cursor: pointer;
        }
        .btn-tool.active-lid { background: linear-gradient(135deg, #00ffcc 0%, #00aa88 100%); color: #05070a; }
        .btn-tool.active-burner { background: linear-gradient(135deg, #ff5533 0%, #aa2200 100%); color: #fff; }

        .canvas-container {
            flex: 1; display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #11151f 0%, #05070a 90%); position: relative;
        }
        canvas { background-color: transparent; max-width: 100%; max-height: 100%; }

        #reaction-monitor {
            background: rgba(10, 14, 20, 0.85); border: 1px solid rgba(0, 255, 204, 0.15);
            color: #00ffcc; font-family: 'Courier New', monospace; font-size: 13px; font-weight: bold;
            padding: 10px 16px; text-align: center; width: calc(100% - 32px); margin: 0 16px 6px 16px;
            border-radius: 10px; min-height: 38px; display: flex; align-items: center; justify-content: center;
        }

        #log-panel { color: #6b7785; font-size: 11px; text-align: center; font-family: monospace; padding-bottom: 4px; }

        .controls {
            background-color: #0e1117; padding: 16px 20px 24px 20px;
            display: flex; flex-direction: column; gap: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.02); border-radius: 28px 28px 0 0;
        }
        .select-container { display: flex; gap: 10px; }
        select {
            flex: 1; background: #151a24; color: #fff; border: 1px solid rgba(255,255,255,0.08);
            padding: 14px; font-size: 14px; font-weight: 600; border-radius: 12px; outline: none;
        }
        .btn-add { background: linear-gradient(135deg, #00ffcc 0%, #0088cc 100%); color: #05070a; font-weight: bold; padding: 0 22px; border: none; border-radius: 12px; }
        .btn-clear { background: linear-gradient(135deg, #ff3b30 0%, #5e0000 100%); border: none; color: white; padding: 14px; font-weight: bold; border-radius: 12px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="brand-wrapper">
            <div class="user-logo-container">
                <img src="image_13.png" alt="Roni Logo">
            </div>
            <div class="splash-title">QUANTUM LAB CORE</div>
        </div>
        
        <div class="slogan-positioner">
            <h2 class="premium-slogan">Never Trust an Atom,<br>They Make up Everything</h2>
        </div>
        
        <div class="start-btn-container">
            <button class="start-btn" onclick="initLab()">SİSTEMİ BAŞLAT</button>
        </div>
    </div>

    <div class="dashboard">
        <div class="indicator">HİDROJEN İNDEKSİ <span id="ph-val">7.00</span></div>
        <div class="indicator">TERMAL ENERJİ <span id="temp-val">298.15 K</span></div>
    </div>

    <div class="tools-container">
        <button id="lidToggle" class="btn-tool" onclick="toggleLid()">🔓 LID (KAPAK AÇIK)</button>
        <button id="burnerToggle" class="btn-tool" onclick="toggleBurner()">🔥 BURNER (KAPALI)</button>
    </div>

    <div class="canvas-container">
        <canvas id="chemCanvas" width="600" height="600"></canvas>
    </div>

    <div id="reaction-monitor">Reaktif bekleniyor... TEPKİME YOK</div>
    <div id="log-panel">Laboratuvar terminali aktif.</div>

    <div class="controls">
        <div class="select-container">
            <select id="substanceSelect">
                <optgroup label="💧 Çözeltiler & Sıvılar">
                    <option value="H2O">Saf Su (H2O)</option>
                    <option value="Litmus">Turnusol Boyası (Litmus)</option>
                    <option value="HNO3">Nitrik Asit (HNO3)</option>
                    <option value="H2SO4">Sülfürik Asit (H2SO4)</option>
                    <option value="HCl">Hidroklorik Asit (HCl)</option>
                </optgroup>
                <optgroup label="🧱 Katı Metaller (1A - 2A - 3A)">
                    <option value="Li">Lityum Metal (Li)</option>
                    <option value="Na">Sodyum Metal (Na)</option>
                    <option value="K">Potasyum Metal (K)</option>
                    <option value="Rb">Rubidyum Metal (Rb)</option>
                    <option value="Cs">Sezyum Metal (Cs)</option>
                    <option value="Be">Berilyum Metal (Be)</option>
                    <option value="Mg">Magnezyum Metal (Mg)</option>
                    <option value="Ca">Kalsiyum Metal (Ca)</option>
                    <option value="Ba">Baryum Metal (Ba)</option>
                    <option value="Al">Alüminyum Metal (Al)</option>
                </optgroup>
                <optgroup label="🧱 Diğer Katı Metaller">
                    <option value="Fe">Demir Metal (Fe)</option>
                    <option value="Pb">Kurşun Metal (Pb)</option>
                    <option value="Ag">Gümüş Metal (Ag)</option>
                    <option value="Cu">Bakır Metal (Cu)</option>
                    <option value="Hg">Cıva Sıvı Metal (Hg)</option>
                    <option value="Au">Altın Metal (Au)</option>
                    <option value="NaCl">Sodyum Klorür / Tuz (NaCl)</option>
                    <option value="AgNO3">Gümüş Nitrat (AgNO3)</option>
                </optgroup>
                <optgroup label="🧪 Güçlü & Zayıf Bazlar">
                    <option value="LiOH">Lityum Hidroksit (LiOH)</option>
                    <option value="NaOH">Sodyum Hidroksit (NaOH)</option>
                    <option value="KOH">Potasyum Hidroksit (KOH)</option>
                    <option value="Mg_OH_2">Magnezyum Hidroksit [Mg(OH)2]</option>
                    <option value="Ca_OH_2">Kalsiyum Hidroksit [Ca(OH)2]</option>
                </optgroup>
            </select>
            <button class="btn-add" onclick="handleAdd()">EKLE</button>
        </div>
        <button class="btn-clear" onclick="clearBeaker()">🗑️ Beheri Temizle / Sıfırla</button>
    </div>

    <script>
        const canvas = document.getElementById('chemCanvas');
        const ctx = canvas.getContext('2d');

        let audioCtx = null;
        let beakerContents = [];
        let mixedPh = 7.0;
        let maxTemp = 298.15;
        let activeIndicators = { litmus: false };
        let hasPrecipitate = false; 
        
        let isLidClosed = false;
        let isBurnerOn = false;

        let liquidLevel = 0; 
        let targetLiquidLevel = 0;
        let waveWave = 0;

        let particles = [];
        let bubbles = [];
        let liquidDrops = [];

        const PALETTES = {
            water: { top: "rgba(0, 180, 216, 0.35)", bottom: "rgba(3, 4, 94, 0.6)" },
            litmusAcid: { top: "rgba(242, 53, 53, 0.6)", bottom: "rgba(138, 12, 12, 0.75)" },
            litmusBase: { top: "rgba(38, 72, 232, 0.6)", bottom: "rgba(14, 25, 133, 0.75)" },
            CuMix: { top: "rgba(0, 160, 220, 0.5)", bottom: "rgba(0, 50, 130, 0.75)" },
            FeMix: { top: "rgba(200, 110, 10, 0.5)", bottom: "rgba(90, 45, 0, 0.75)" },
            defaultMix: { top: "rgba(215, 220, 228, 0.35)", bottom: "rgba(95, 105, 120, 0.6)" }
        };

        function playBeepSound(freq, duration, type="sine") {
            if (!audioCtx) return;
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch(e){}
        }

        function initLab() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('splash-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash-screen').style.display = 'none';
                playBeepSound(523.25, 0.15, "triangle");
            }, 500);
        }

        class LiquidDrop {
            constructor(color) {
                this.x = 300 + (Math.random() * 20 - 10); this.y = 20;
                this.speed = 11; this.color = color; this.length = 14;
            }
            update(surfaceY) {
                this.y += this.speed;
                if (this.y >= surfaceY) { playBeepSound(600, 0.08, "sine"); return true; }
                return false;
            }
            draw() {
                ctx.save(); ctx.strokeStyle = this.color; ctx.lineWidth = 3.5;
                ctx.lineCap = "round"; ctx.beginPath();
                ctx.moveTo(this.x, this.y); ctx.lineTo(this.x, this.y + this.length);
                ctx.stroke(); ctx.restore();
            }
        }

        class Bubble {
            constructor() {
                this.x = Math.random() * 210 + 195; this.y = 475;
                this.radius = Math.random() * 2 + 0.8; this.vy = -(Math.random() * 1.3 + 0.5);
                this.wobble = Math.random() * 100;
            }
            update() { this.y += this.vy; this.x += Math.sin(this.wobble / 12) * 0.4; this.wobble++; }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(255, 255, 255, 0.18)"; ctx.fill();
            }
        }

        class Spark {
            constructor(x, y, color="#ff5533") {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 14; this.vy = (Math.random() - 0.9) * 16;
                this.radius = Math.random() * 3.5 + 1.2; this.life = 1.0; this.decay = Math.random() * 0.025 + 0.018;
                this.color = color;
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += 0.3; this.life -= this.decay; }
            draw() {
                ctx.save(); ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill(); ctx.restore();
            }
        }

        function toggleLid() {
            isLidClosed = !isLidClosed;
            const btn = document.getElementById('lidToggle');
            playBeepSound(400, 0.05);
            if (isLidClosed) { btn.className = "btn-tool active-lid"; btn.innerText = "🔒 LID (KAPAK KAPALI)"; }
            else { btn.className = "btn-tool"; btn.innerText = "🔓 LID (KAPAK AÇIK)"; }
        }

        function toggleBurner() {
            isBurnerOn = !isBurnerOn;
            const btn = document.getElementById('burnerToggle');
            playBeepSound(isBurnerOn ? 700 : 300, 0.08, "triangle");
            if (isBurnerOn) { btn.className = "btn-tool active-burner"; btn.innerText = "🔥 BURNER (ISITICI AÇIK)"; }
            else { btn.className = "btn-tool"; btn.innerText = "🔥 BURNER (KAPALI)"; }
        }

        function updateMonitor(text) { document.getElementById('reaction-monitor').innerText = text; }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            waveWave += 0.07;

            if (isBurnerOn) {
                maxTemp = Math.min(maxTemp + 0.6, 680.00);
                document.getElementById('temp-val').innerText = maxTemp.toFixed(2) + " K";
            } else if (maxTemp > 298.15) {
                maxTemp = Math.max(maxTemp - 0.18, 298.15);
                document.getElementById('temp-val').innerText = maxTemp.toFixed(2) + " K";
            }

            if (liquidLevel < targetLiquidLevel) liquidLevel += 0.01;
            if (liquidLevel > targetLiquidLevel) liquidLevel -= 0.01;

            let bX = 180, bY = 120, bW = 240, bH = 360, bR = 20;
            let currentHeight = bH * liquidLevel;
            let surfaceY = (bY + bH) - currentHeight;

            for (let i = liquidDrops.length - 1; i >= 0; i--) {
                let hit = liquidDrops[i].update(surfaceY);
                if (hit) { liquidDrops.splice(i, 1); targetLiquidLevel = Math.min(targetLiquidLevel + 0.15, 0.90); }
                else { liquidDrops[i].draw(); }
            }

            if (liquidLevel > 0.01) {
                ctx.save();
                let colorBase = getLiquidPalette();
                let liquidGrad = ctx.createLinearGradient(bX, surfaceY, bX, bY + bH);
                liquidGrad.addColorStop(0, colorBase.top);
                liquidGrad.addColorStop(1, colorBase.bottom);
                ctx.fillStyle = liquidGrad;

                ctx.beginPath(); ctx.moveTo(bX + 4, bY + bH - 4); ctx.lineTo(bX + 4, surfaceY);
                for (let x = bX + 4; x <= bX + bW - 4; x++) {
                    let waveY = surfaceY + Math.sin((x / 18) + waveWave) * 4.5 * liquidLevel;
                    ctx.lineTo(x, waveY);
                }
                ctx.lineTo(bX + bW - 4, bY + bH - 4);
                ctx.closePath(); ctx.fill(); ctx.restore();

                if (hasPrecipitate) {
                    ctx.save(); ctx.fillStyle = "rgba(240, 240, 245, 0.85)";
                    ctx.beginPath(); ctx.ellipse(bX + bW/2, bY + bH - 8, bW/2 - 8, 10, 0, 0, Math.PI * 2);
                    ctx.fill(); ctx.restore();
                }

                if (Math.random() < 0.12 + (maxTemp - 298) * 0.004) bubbles.push(new Bubble());
            }

            for (let i = bubbles.length - 1; i >= 0; i--) {
                bubbles[i].update();
                let waveAtX = surfaceY + Math.sin((bubbles[i].x / 18) + waveWave) * 4.5 * liquidLevel;
                if (bubbles[i].y < waveAtX + 4 || liquidLevel === 0) bubbles.splice(i, 1);
                else bubbles[i].draw();
            }

            ctx.save();
            ctx.strokeStyle = "rgba(255, 255, 255, 0.18)"; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(bX, bY); ctx.lineTo(bX, bY + bH - bR);
            ctx.arcTo(bX, bY + bH, bX + bR, bY + bH, bR); ctx.lineTo(bX + bW - bR, bY + bH);
            ctx.arcTo(bX + bW, bY + bH, bX + bW, bY + bH - bR, bR); ctx.lineTo(bX + bW, bY);
            ctx.stroke();

            if (isLidClosed) {
                ctx.strokeStyle = "#00ffcc"; ctx.lineWidth = 6;
                ctx.beginPath(); ctx.moveTo(bX - 6, bY); ctx.lineTo(bX + bW + 6, bY); ctx.stroke();
            }

            if (isBurnerOn) {
                ctx.save(); ctx.shadowBlur = 20; ctx.shadowColor = "#ff5533";
                ctx.fillStyle = "rgba(255, 85, 51, 0.3)";
                ctx.fillRect(bX + 20, bY + bH + 4, bW - 40, 14); ctx.restore();
            }
            ctx.restore();

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].life <= 0) particles.splice(i, 1);
                else particles[i].draw();
            }

            requestAnimationFrame(animate);
        }

        function getLiquidPalette() {
            if (activeIndicators.litmus) return mixedPh < 7.0 ? PALETTES.litmusAcid : PALETTES.litmusBase;
            if (beakerContents.includes("Cu")) return PALETTES.CuMix;
            if (beakerContents.includes("Fe")) return PALETTES.FeMix;
            if (beakerContents.includes("H2O") && beakerContents.length === 1) return PALETTES.water;
            return PALETTES.defaultMix;
        }

        function handleAdd() {
            const select = document.getElementById('substanceSelect');
            const val = select.value;
            
            if (["H2O", "HCl", "HNO3", "H2SO4", "Litmus", "LiOH", "NaOH", "KOH"].includes(val)) {
                liquidDrops.push(new LiquidDrop(val === "H2O" ? "rgba(0,180,216,0.8)" : "rgba(255,255,255,0.7)"));
            } else {
                targetLiquidLevel = Math.min(targetLiquidLevel + 0.12, 0.90);
                playBeepSound(280, 0.1, "triangle");
            }

            if (!beakerContents.includes(val)) beakerContents.push(val);

            if (["Li", "Na", "K", "Rb", "Cs"].includes(val)) {
                if (beakerContents.includes("H2O")) {
                    let currentSurfaceY = 480 - (360 * targetLiquidLevel);
                    let flashColor = ["K","Rb","Cs"].includes(val) ? "#cc00ff" : "#ff5533";
                    for (let i = 0; i < 70; i++) particles.push(new Spark(300, currentSurfaceY, flashColor));
                    mixedPh = 13.40; maxTemp += 55.0; playBeepSound(140, 0.45, "sawtooth");
                    updateMonitor(`⚠️ PATLAMA! 2${val}(k) + 2H₂O(s) → 2${val}OH(suda) + H₂(g)`);
                } else { updateMonitor(`Metal İlavesi: Behere ${val}(k) eklendi.`); }
            }
            else if (["Mg", "Ca", "Ba", "Be"].includes(val)) {
                if (beakerContents.includes("H2O")) {
                    mixedPh = 11.20; maxTemp += 15.0;
                    updateMonitor(`Tepkime: ${val}(k) + 2H₂O(s) → ${val}(OH)₂(suda) + H₂(g)`);
                } else { updateMonitor(`Metal İlavesi: ${val}(k) eklendi.`); }
            }
            else if (val === "Al") { updateMonitor(`Amfoter Metal: Al eklendi. Kuvvetli asit veya baz bekliyor.`); }
            else if (["LiOH", "NaOH", "KOH", "Mg_OH_2", "Ca_OH_2"].includes(val)) {
                mixedPh = ["LiOH", "NaOH", "KOH"].includes(val) ? 13.80 : 11.00;
                if (beakerContents.some(r => ["HCl","HNO3","H2SO4"].includes(r))) {
                    mixedPh = 7.00; maxTemp += 32.0; updateMonitor(`⚡ NÖTRLEŞME: Asit + Baz Tepkimesi`);
                } else { updateMonitor(`Baz İlavesi: Çözelti bazikleşti.`); }
            }
            else if ((val === "AgNO3" && beakerContents.includes("NaCl")) || (val === "NaCl" && beakerContents.includes("AgNO3"))) {
                hasPrecipitate = true; updateMonitor(`Çökelme: Ag⁺ + Cl⁻ → AgCl(k) ⚪ (Beyaz Çökelek)`);
            }
            else { updateMonitor(`Sistem: ${val} başarıyla behere aktarıldı.`); }

            document.getElementById('ph-val').innerText = mixedPh.toFixed(2);
            document.getElementById('temp-val').innerText = maxTemp.toFixed(2) + " K";
        }

        function clearBeaker() {
            beakerContents = []; mixedPh = 7.0; maxTemp = 298.15;
            activeIndicators = { litmus: false }; hasPrecipitate = false;
            particles = []; bubbles = []; liquidDrops = []; targetLiquidLevel = 0;
            updateMonitor("Reaktif bekleniyor... TEPKİME YOK");
            document.getElementById('ph-val').innerText = "7.00";
            document.getElementById('temp-val').innerText = "298.15 K";
            playBeepSound(180, 0.12, "sine");
        }

        animate();
    </script>
</body>
</html>
