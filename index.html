<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Roni 3D Kimya Laboratuvarı Ultra</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body {
            background-color: #08090c;
            color: #e0e6ed;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        /* Cyber Lab Göstergeleri */
        .dashboard {
            display: flex;
            gap: 15px;
            padding: 24px 20px 10px 20px;
            background: linear-gradient(to bottom, #11141a, #08090c);
        }
        .indicator {
            flex: 1;
            background: rgba(20, 24, 33, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            font-family: 'SF Pro Text', -apple-system, sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .indicator span {
            display: block;
            font-family: 'Courier New', monospace;
            font-size: 22px;
            font-weight: bold;
            margin-top: 5px;
        }
        #ph-val { color: #00ffcc; text-shadow: 0 0 12px rgba(0,255,204,0.4); }
        #temp-val { color: #ff5533; text-shadow: 0 0 12px rgba(255,85,51,0.4); }

        /* Simülasyon Ekranı */
        .canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #151922 0%, #08090c 90%);
            position: relative;
        }
        canvas {
            background-color: transparent;
            max-width: 100%;
            max-height: 100%;
        }

        /* Bilgi Akış Çubuğu */
        #log-panel {
            background-color: #08090c;
            color: #8f9cae;
            font-size: 13px;
            padding: 12px 20px;
            text-align: center;
            font-family: monospace;
            letter-spacing: 0.5px;
        }

        /* Dokunmatik Buton Grubu */
        .controls {
            background-color: #11141a;
            padding: 24px 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 32px 32px 0 0;
            box-shadow: 0 -15px 35px rgba(0,0,0,0.6);
        }
        button {
            background: linear-gradient(135deg, #232933 0%, #171b22 100%);
            color: #ffffff;
            border: 1px solid rgba(255,255,255,0.03);
            padding: 18px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            transition: all 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }
        button:active {
            transform: scale(0.95);
            background: #ffffff;
            color: #08090c;
            box-shadow: 0 0 20px rgba(255,255,255,0.6);
        }
        .btn-clear {
            grid-column: span 2;
            background: linear-gradient(135deg, #ff3b30 0%, #660000 100%);
            color: #fff;
            border: 1px solid rgba(255,59,48,0.2);
        }
        .btn-clear:active {
            background: #ff3b30;
            box-shadow: 0 0 25px rgba(255,59,48,0.5);
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="indicator">HİDROJEN İNDEKSİ <span id="ph-val">7.00</span></div>
        <div class="indicator">TERMAL ENERJİ <span id="temp-val">298.15 K</span></div>
    </div>

    <div class="canvas-container">
        <canvas id="chemCanvas" width="600" height="600"></canvas>
    </div>

    <div id="log-panel">Sistem stabil. Deney için kimyasal eklenmesi bekleniyor...</div>

    <div class="controls">
        <button onclick="addWater()">Saf Su Ekle (H2O)</button>
        <button onclick="addSodium()">Sodyum Ekle (Na)</button>
        <button onclick="addHCl()">Asit Ekle (HCl)</button>
        <button onclick="addNaOH()">Baz Ekle (NaOH)</button>
        <button onclick="addIndicator()">Fenolftalein İndikatörü</button>
        <button class="btn-clear" onclick="clearBeaker()">🗑️ Beheri Temizle / Sıfırla</button>
    </div>

    <script>
        const canvas = document.getElementById('chemCanvas');
        const ctx = canvas.getContext('2d');

        // Laboratuvar Durum Hafızası
        let beakerContents = [];
        let mixedPh = 7.0;
        let maxTemp = 298.15;
        let hasIndicator = false;
        
        let liquidLevel = 0; 
        let targetLiquidLevel = 0;
        let waveWave = 0;

        let particles = [];
        let bubbles = [];

        // Profesyonel Renk Paletleri (Sıvı Yoğunluk Degradeleri)
        const COLORS = {
            water: { top: "rgba(0, 180, 216, 0.35)", bottom: "rgba(3, 4, 94, 0.6)" },
            baseIndicator: { top: "rgba(255, 0, 127, 0.55)", bottom: "rgba(150, 0, 80, 0.75)" },
            saltSolution: { top: "rgba(220, 225, 233, 0.35)", bottom: "rgba(100, 110, 125, 0.55)" },
            transparent: { top: "transparent", bottom: "transparent" }
        };

        class Bubble {
            constructor() {
                this.x = Math.random() * 220 + 190;
                this.y = 475;
                this.radius = Math.random() * 2.5 + 1;
                this.vy = -(Math.random() * 1.2 + 0.6);
                this.wobble = Math.random() * 100;
            }
            update() {
                this.y += this.vy;
                this.x += Math.sin(this.wobble / 12) * 0.4;
                this.wobble++;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(255, 255, 255, 0.22)";
                ctx.fill();
            }
        }

        class Spark {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 12;
                this.vy = (Math.random() - 0.9) * 14;
                this.radius = Math.random() * 3.5 + 1.5;
                this.life = 1.0;
                this.decay = Math.random() * 0.025 + 0.015;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.28;
                this.life -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#ff5533";
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 90, 40, ${this.life})`;
                ctx.fill();
                ctx.restore();
            }
        }

        // Ana Grafik Çizim Döngüsü
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            waveWave += 0.07;

            if (liquidLevel < targetLiquidLevel) liquidLevel += 0.01;
            if (liquidLevel > targetLiquidLevel) liquidLevel -= 0.01;

            let bX = 180, bY = 120, bW = 240, bH = 360, bR = 20;
            let currentHeight = bH * liquidLevel;
            let surfaceY = (bY + bH) - currentHeight;

            // 1. DİNAMİK SIVI VE 3D REYALİSTİK MENİSKÜS ÇİZİMİ
            if (liquidLevel > 0.01) {
                ctx.save();
                
                // Sıvı Renk Gradiyenti Tanımlama
                let liquidGrad = ctx.createLinearGradient(bX, surfaceY, bX, bY + bH);
                let currentPalette = COLORS.water;
                
                if (hasIndicator && mixedPh > 8.3) currentPalette = COLORS.baseIndicator;
                else if (beakerContents.length > 1 || beakerContents.includes("Na") || beakerContents.includes("HCl") || beakerContents.includes("NaOH")) currentPalette = COLORS.saltSolution;
                
                liquidGrad.addColorStop(0, currentPalette.top);
                liquidGrad.addColorStop(1, currentPalette.bottom);
                ctx.fillStyle = liquidGrad;

                // Sıvı Kütlesi Maskesi
                ctx.beginPath();
                ctx.moveTo(bX + 4, bY + bH - 4);
                ctx.lineTo(bX + 4, surfaceY);
                
                // Üst Sıvı Yüzeyi Akıcı Dalga Çizimi
                for (let x = bX + 4; x <= bX + bW - 4; x++) {
                    let waveY = surfaceY + Math.sin((x / 18) + waveWave) * 4.5 * liquidLevel;
                    ctx.lineTo(x, waveY);
                }
                
                ctx.lineTo(bX + bW - 4, bY + bH - 4);
                ctx.closePath();
                ctx.fill();
                ctx.restore();

                // Kabarcık Frekansı Kontrolü
                if (Math.random() < 0.12 + (maxTemp - 298) * 0.003) {
                    bubbles.push(new Bubble());
                }
            }

            // 2. KABARCIK TAKİP VE SİLME
            for (let i = bubbles.length - 1; i >= 0; i--) {
                bubbles[i].update();
                let waveAtX = surfaceY + Math.sin((bubbles[i].x / 18) + waveWave) * 4.5 * liquidLevel;
                if (bubbles[i].y < waveAtX + 4 || liquidLevel === 0) {
                    bubbles.splice(i, 1);
                } else {
                    bubbles[i].draw();
                }
            }

            // 3. PROFESYONEL CAM BEHER VE YANSIMA EFEKTLERİ (THIX TARZI)
            ctx.save();
            ctx.strokeStyle = "rgba(255, 255, 255, 0.15)";
            ctx.lineWidth = 4;
            ctx.lineCap = "round";
            
            // Ana Cam Silüeti
            ctx.beginPath();
            ctx.moveTo(bX, bY);
            ctx.lineTo(bX, bY + bH - bR);
            ctx.arcTo(bX, bY + bH, bX + bR, bY + bH, bR);
            ctx.lineTo(bX + bW - bR, bY + bH);
            ctx.arcTo(bX + bW, bY + bH, bX + bW, bY + bH - bR, bR);
            ctx.lineTo(bX + bW, bY);
            ctx.stroke();

            // Sol Cam Parlama Çizgisi (Kırılma Efekti)
            let glassGlowLeft = ctx.createLinearGradient(bX + 8, bY, bX + 16, bY);
            glassGlowLeft.addColorStop(0, "rgba(255, 255, 255, 0.25)");
            glassGlowLeft.addColorStop(1, "rgba(255, 255, 255, 0.0)");
            ctx.fillStyle = glassGlowLeft;
            ctx.fillRect(bX + 4, bY + 10, 8, bH - 20);

            // Sağ Cam İnce Parlama
            ctx.strokeStyle = "rgba(255, 255, 255, 0.08)";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(bX + bW - 6, bY + 15);
            ctx.lineTo(bX + bW - 6, bY + bH - 15);
            ctx.stroke();
            ctx.restore();

            // 4. KIVILCIM MOTORU GÜNCELLEME
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                } else {
                    particles[i].draw();
                }
            }

            requestAnimationFrame(animate);
        }

        // Kimyasal Algoritmalar Paneli
        function updateLayoutState() {
            document.getElementById('ph-val').innerText = mixedPh.toFixed(2);
            document.getElementById('temp-val').innerText = maxTemp.toFixed(2) + " K";
        }

        function log(msg) {
            document.getElementById('log-panel').innerText = msg;
        }

        function addWater() {
            if (!beakerContents.includes("H2O")) beakerContents.push("H2O");
            targetLiquidLevel = Math.min(targetLiquidLevel + 0.22, 0.85);
            log("Sistem: Saf Su (H2O) eklendi. Nötr dengelenme.");
            updateLayoutState();
        }

        function addSodium() {
            targetLiquidLevel = Math.min(targetLiquidLevel + 0.08, 0.85);
            if (beakerContents.includes("H2O")) {
                let currentSurfaceY = 480 - (360 * targetLiquidLevel);
                for (let i = 0; i < 60; i++) {
                    particles.push(new Spark(300, currentSurfaceY + 20));
                }
                mixedPh = 12.90; 
                maxTemp = 354.15;
                if (!beakerContents.includes("NaOH")) beakerContents.push("NaOH");
                log("Reaksiyon: 2Na(k) + 2H2O(s) -> 2NaOH(suda) + H2(g) (Ekzotermik)");
            } else {
                beakerContents.push("Na");
                log("Sistem: Sodyum susuz ortama eklendi. Aktivasyon yok.");
            }
            updateLayoutState();
        }

        function addHCl() {
            beakerContents.push("HCl");
            targetLiquidLevel = Math.min(targetLiquidLevel + 0.15, 0.85);
            if (beakerContents.includes("NaOH")) {
                mixedPh = 7.00;
                maxTemp += 21.0;
                log("Nötrleşme: HCl + NaOH -> NaCl + H2O (Isı Enerjisi Açığa Çıktı)");
            } else {
                mixedPh = 1.20;
                log("Sistem: Kuvvetli Hidroklorik Asit (HCl) ilave edildi.");
            }
            updateLayoutState();
        }

        function addNaOH() {
            beakerContents.push("NaOH");
            targetLiquidLevel = Math.min(targetLiquidLevel + 0.15, 0.85);
            if (beakerContents.includes("HCl")) {
                mixedPh = 7.00;
                maxTemp += 21.0;
                log("Nötrleşme: HCl + NaOH -> NaCl + H2O (Isı Enerjisi Açığa Çıktı)");
            } else {
                mixedPh = 13.60;
                log("Sistem: Kuvvetli Sodyum Hidroksit (NaOH) bazı eklendi.");
            }
            updateLayoutState();
        }

        function addIndicator() {
            hasIndicator = true;
            log("İndikatör: Fenolftalein entegre edildi. Renk skalası aktif.");
            updateLayoutState();
        }

        function clearBeaker() {
            beakerContents = [];
            mixedPh = 7.0;
            maxTemp = 298.15;
            hasIndicator = false;
            particles = [];
            bubbles = [];
            targetLiquidLevel = 0;
            log("Sistem: Beher deşarj edildi. Yeni reaksiyona hazır.");
            updateLayoutState();
        }

        // Simülasyonu Başlat
        animate();
    </script>
</body>
</html>
