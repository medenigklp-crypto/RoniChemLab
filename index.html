<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Roni 3D Kimya Laboratuvarı Ultra</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body {
            background-color: #08090c;
            color: #e0e6ed;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        /* Cyber Lab Göstergeleri */
        .dashboard {
            display: flex;
            gap: 15px;
            padding: 24px 20px 10px 20px;
            background: linear-gradient(to bottom, #11141a, #08090c);
        }
        .indicator {
            flex: 1;
            background: rgba(20, 24, 33, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .indicator span {
            display: block;
            font-family: 'Courier New', monospace;
            font-size: 22px;
            font-weight: bold;
            margin-top: 5px;
        }
        #ph-val { color: #00ffcc; text-shadow: 0 0 12px rgba(0,255,204,0.4); }
        #temp-val { color: #ff5533; text-shadow: 0 0 12px rgba(255,85,51,0.4); }

        /* Simülasyon Ekranı */
        .canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #151922 0%, #08090c 90%);
            position: relative;
        }
        canvas {
            background-color: transparent;
            max-width: 100%;
            max-height: 100%;
        }

        #log-panel {
            background-color: #08090c;
            color: #8f9cae;
            font-size: 13px;
            padding: 12px 20px;
            text-align: center;
            font-family: monospace;
        }

        /* Profesyonel Kontrol Paneli */
        .controls {
            background-color: #11141a;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 32px 32px 0 0;
            box-shadow: 0 -15px 35px rgba(0,0,0,0.6);
        }
        
        .select-container {
            display: flex;
            gap: 10px;
        }

        select {
            flex: 1;
            background: #171b22;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 16px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 14px;
            outline: none;
        }

        .btn-add {
            background: linear-gradient(135deg, #00ffcc 0%, #0088cc 100%);
            color: #08090c;
            font-weight: bold;
            padding: 0 25px;
        }

        button {
            background: linear-gradient(135deg, #232933 0%, #171b22 100%);
            color: #ffffff;
            border: 1px solid rgba(255,255,255,0.03);
            padding: 16px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            -webkit-tap-highlight-color: transparent;
        }
        button:active { transform: scale(0.97); }
        
        .btn-clear {
            background: linear-gradient(135deg, #ff3b30 0%, #660000 100%);
            border: 1px solid rgba(255,59,48,0.2);
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="indicator">HİDROJEN İNDEKSİ <span id="ph-val">7.00</span></div>
        <div class="indicator">TERMAL ENERJİ <span id="temp-val">298.15 K</span></div>
    </div>

    <div class="canvas-container">
        <canvas id="chemCanvas" width="600" height="600"></canvas>
    </div>

    <div id="log-panel">Laboratuvar reaktif seçimi için hazır.</div>

    <div class="controls">
        <div class="select-container">
            <select id="substanceSelect">
                <optgroup label="Sıvılar & Çözücüler">
                    <option value="H2O">Saf Su (H2O)</option>
                    <option value="HCl">Hidroklorik Asit (HCl)</option>
                    <option value="NaOH">Sodyum Hidroksit (NaOH)</option>
                </optgroup>
                <optgroup label="Metal & Katılar">
                    <option value="Na">Sodyum Metal (Na)</option>
                    <option value="NaCl">Sodyum Klorür (NaCl)</option>
                    <option value="AgNO3">Gümüş Nitrat (AgNO3)</option>
                </optgroup>
                <optgroup label="Renkli Çözeltiler">
                    <option value="CuSO4">Bakır Sülfat (CuSO4) - Mavi</option>
                    <option value="KMnO4">Potasyum Permanganat (KMnO4) - Mor</option>
                    <option value="FeCl3">Demir(III) Klorür (FeCl3) - Kehribar</option>
                </optgroup>
                <optgroup label="İndikatörler">
                    <option value="Phenol">Fenolftalein İndikatörü</option>
                    <option value="Litmus">Turnusol Boyası çözeltisi</option>
                </optgroup>
            </select>
            <button class="btn-add" onclick="handleAdd()">EKLE</button>
        </div>
        <button class="btn-clear" onclick="clearBeaker()">🗑️ Beheri Temizle / Sıfırla</button>
    </div>

    <script>
        const canvas = document.getElementById('chemCanvas');
        const ctx = canvas.getContext('2d');

        let beakerContents = [];
        let mixedPh = 7.0;
        let maxTemp = 298.15;
        let activeIndicators = { phenol: false, litmus: false };
        let hasPrecipitate = false; // Çökelme var mı?
        
        let liquidLevel = 0; 
        let targetLiquidLevel = 0;
        let waveWave = 0;

        let particles = [];
        let bubbles = [];

        // Karışım Renk Algoritması (RGB ağırlıklı)
        let currentRGB = { r: 0, g: 0, b: 0, a: 0 };

        class Bubble {
            constructor() {
                this.x = Math.random() * 220 + 190;
                this.y = 475;
                this.radius = Math.random() * 2 + 0.8;
                this.vy = -(Math.random() * 1.2 + 0.5);
                this.wobble = Math.random() * 100;
            }
            update() {
                this.y += this.vy;
                this.x += Math.sin(this.wobble / 12) * 0.4;
                this.wobble++;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
                ctx.fill();
            }
        }

        class Spark {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 12;
                this.vy = (Math.random() - 0.9) * 14;
                this.radius = Math.random() * 3.5 + 1.5;
                this.life = 1.0;
                this.decay = Math.random() * 0.02 + 0.015;
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += 0.28; this.life -= this.decay; }
            draw() {
                ctx.save(); ctx.shadowBlur = 15; ctx.shadowColor = "#ff5533";
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 90, 40, ${this.life})`; ctx.fill(); ctx.restore();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            waveWave += 0.07;

            if (liquidLevel < targetLiquidLevel) liquidLevel += 0.01;
            if (liquidLevel > targetLiquidLevel) liquidLevel -= 0.01;

            let bX = 180, bY = 120, bW = 240, bH = 360, bR = 20;
            let currentHeight = bH * liquidLevel;
            let surfaceY = (bY + bH) - currentHeight;

            // 1. SIVI VE DEGRADE ÇİZİMİ
            if (liquidLevel > 0.01) {
                ctx.save();
                
                let colorBase = calculateLiquidColor();
                let liquidGrad = ctx.createLinearGradient(bX, surfaceY, bX, bY + bH);
                liquidGrad.addColorStop(0, colorBase.top);
                liquidGrad.addColorStop(1, colorBase.bottom);
                ctx.fillStyle = liquidGrad;

                ctx.beginPath();
                ctx.moveTo(bX + 4, bY + bH - 4);
                ctx.lineTo(bX + 4, surfaceY);
                
                for (let x = bX + 4; x <= bX + bW - 4; x++) {
                    let waveY = surfaceY + Math.sin((x / 18) + waveWave) * 4.5 * liquidLevel;
                    ctx.lineTo(x, waveY);
                }
                
                ctx.lineTo(bX + bW - 4, bY + bH - 4);
                ctx.closePath();
                ctx.fill();
                ctx.restore();

                // 2. AGCL BEYAZ ÇÖKELTİ EFEKTİ (DİBTE BİRİKME)
                if (hasPrecipitate) {
                    ctx.save();
                    let precipGrad = ctx.createLinearGradient(bX, bY + bH - 25, bX, bY + bH);
                    precipGrad.addColorStop(0, "rgba(240, 240, 245, 0.2)");
                    precipGrad.addColorStop(1, "rgba(255, 255, 255, 0.85)");
                    ctx.fillStyle = precipGrad;
                    ctx.beginPath();
                    ctx.moveTo(bX + 6, bY + bH - 4);
                    ctx.ellipse(bX + bW/2, bY + bH - 8, bW/2 - 8, 12, 0, 0, Math.PI, true);
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();
                }

                if (Math.random() < 0.12 + (maxTemp - 298) * 0.003) bubbles.push(new Bubble());
            }

            // KABARCIKLAR
            for (let i = bubbles.length - 1; i >= 0; i--) {
                bubbles[i].update();
                let waveAtX = surfaceY + Math.sin((bubbles[i].x / 18) + waveWave) * 4.5 * liquidLevel;
                if (bubbles[i].y < waveAtX + 4 || liquidLevel === 0) bubbles.splice(i, 1);
                else bubbles[i].draw();
            }

            // 3. CAM BEHER VE BARKOD/YANSIMALAR
            ctx.save();
            ctx.strokeStyle = "rgba(255, 255, 255, 0.16)";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(bX, bY); ctx.lineTo(bX, bY + bH - bR);
            ctx.arcTo(bX, bY + bH, bX + bR, bY + bH, bR);
            ctx.lineTo(bX + bW - bR, bY + bH);
            ctx.arcTo(bX + bW, bY + bH, bX + bW, bY + bH - bR, bR);
            ctx.lineTo(bX + bW, bY);
            ctx.stroke();

            // Cam Parlaması
            let glassGlow = ctx.createLinearGradient(bX + 4, bY, bX + 14, bY);
            glassGlow.addColorStop(0, "rgba(255, 255, 255, 0.22)");
            glassGlow.addColorStop(1, "rgba(255, 255, 255, 0.0)");
            ctx.fillStyle = glassGlow;
            ctx.fillRect(bX + 4, bY + 10, 8, bH - 20);
            ctx.restore();

            // KIVILCIM MOTORU
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].life <= 0) particles.splice(i, 1);
                else particles[i].draw();
            }

            requestAnimationFrame(animate);
        }

        // Dinamik Renk Belirleme Lab Laboratuvarı
        function calculateLiquidColor() {
            // Turnusol Koşulu Kontrolü
            if (activeIndicators.litmus) {
                return mixedPh < 7.0 
                    ? { top: "rgba(230, 40, 40, 0.5)", bottom: "rgba(140, 15, 15, 0.7)" }  // Asidik Turnusol (Kırmızı)
                    : { top: "rgba(40, 90, 230, 0.5)", bottom: "rgba(15, 30, 140, 0.7)" }; // Bazik/Nötr Turnusol (Mavi)
            }
            
            // Fenolftalein Koşulu
            if (activeIndicators.phenol && mixedPh > 8.3) {
                return { top: "rgba(255, 0, 127, 0.55)", bottom: "rgba(150, 0, 80, 0.75)" };
            }

            // Baskın Kimyasal Renk Skalası
            if (beakerContents.includes("CuSO4")) return { top: "rgba(0, 150, 255, 0.5)", bottom: "rgba(0, 50, 150, 0.75)" };
            if (beakerContents.includes("KMnO4")) return { top: "rgba(180, 0, 180, 0.55)", bottom: "rgba(70, 0, 80, 0.8)" };
            if (beakerContents.includes("FeCl3")) return { top: "rgba(218, 145, 0, 0.5)", bottom: "rgba(120, 60, 0, 0.75)" };
            if (beakerContents.includes("H2O") && beakerContents.length === 1) return { top: "rgba(0, 180, 216, 0.35)", bottom: "rgba(3, 4, 94, 0.6)" };
            
            if (beakerContents.length > 0) return { top: "rgba(220, 225, 233, 0.35)", bottom: "rgba(100, 110, 125, 0.55)" };
            return { top: "transparent", bottom: "transparent" };
        }

        function handleAdd() {
            const select = document.getElementById('substanceSelect');
            const val = select.value;
            
            if (!beakerContents.includes(val)) beakerContents.push(val);
            targetLiquidLevel = Math.min(targetLiquidLevel + 0.18, 0.88);

            // Kimyasal Reaksiyon Matrisi
            if (val === "Na") {
                if (beakerContents.includes("H2O")) {
                    let currentSurfaceY = 480 - (360 * targetLiquidLevel);
                    for (let i = 0; i < 55; i++) particles.push(new Spark(300, currentSurfaceY + 20));
                    mixedPh = 12.80; maxTemp = 354.15;
                    beakerContents.push("NaOH");
                    log("Reaksiyon: Sodyum suyla şiddetle reaksiyona girdi! Patlama ve H2 gazı çıkışı.");
                } else {
                    log("Sistem: Sodyum metal parçası susuz ortama bırakıldı.");
                }
            }
            else if (val === "H2O") {
                if (beakerContents.includes("Na")) {
                    let currentSurfaceY = 480 - (360 * targetLiquidLevel);
                    for (let i = 0; i < 55; i++) particles.push(new Spark(300, currentSurfaceY + 20));
                    mixedPh = 12.80; maxTemp = 354.15;
                    beakerContents.push("NaOH");
                    log("Reaksiyon: Metalik Sodyum üzerine su eklenince şiddetle alevlendi!");
                } else {
                    log("Sistem: Behere Saf Su (H2O) ilave edildi.");
                }
            }
            else if (val === "HCl") {
                if (beakerContents.includes("NaOH")) {
                    mixedPh = 7.00; maxTemp += 22.0;
                    log("Nötrleşme: HCl + NaOH -> NaCl + H2O Reaksiyonu (Ekzotermik Isı)");
                } else {
                    mixedPh = 1.10;
                    log("Sistem: Güçlü Hidroklorik Asit çözeltisi eklendi.");
                }
            }
            else if (val === "NaOH") {
                if (beakerContents.includes("HCl")) {
                    mixedPh = 7.00; maxTemp += 22.0;
                    log("Nötrleşme: HCl + NaOH -> NaCl + H2O Reaksiyonu (Ekzotermik Isı)");
                } else {
                    mixedPh = 13.70;
                    log("Sistem: Güçlü Sodyum Hidroksit baz çözeltisi eklendi.");
                }
            }
            // AgCl Beyaz Çökelme Reaksiyonu
            else if ((val === "AgNO3" && beakerContents.includes("NaCl")) || (val === "NaCl" && beakerContents.includes("AgNO3"))) {
                hasPrecipitate = true;
                log("Çökelme: AgNO3 + NaCl -> AgCl(k) ⚪ + NaNO3 (Beyaz Gümüş Klorür çöktü!)");
            }
            else if (val === "Phenol") { activeIndicators.phenol = true; log("İndikatör: Fenolftalein damlatıldı."); }
            else if (val === "Litmus") { activeIndicators.litmus = true; log("İndikatör: Turnusol boyası damlatıldı. Renk pH'a duyarlı."); }
            else if (val === "CuSO4") { log("Sistem: Bakır Sülfat çözeltisi eklendi. Hidratasyon mavisi."); }
            else if (val === "KMnO4") { log("Sistem: Potasyum Permanganat eklendi. Güçlü mor renk."); }
            else if (val === "FeCl3") { log("Sistem: Demir(III) Klorür eklendi. Yoğun kehribar/kahverengi."); }
            else { log(`Sistem: ${val} başarıyla behere ilave edildi.`); }

            document.getElementById('ph-val').innerText = mixedPh.toFixed(2);
            document.getElementById('temp-val').innerText = maxTemp.toFixed(2) + " K";
        }

        function clearBeaker() {
            beakerContents = []; mixedPh = 7.0; maxTemp = 298.15;
            activeIndicators = { phenol: false, litmus: false };
            hasPrecipitate = false; particles = []; bubbles = []; targetLiquidLevel = 0;
            log("Sistem: Beher tahliye edildi ve tamamen temizlendi.");
            document.getElementById('ph-val').innerText = "7.00";
            document.getElementById('temp-val').innerText = "298.15 K";
        }

        animate();
    </script>
</body>
</html>
